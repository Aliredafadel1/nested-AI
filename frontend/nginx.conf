upstream api_backend {
    server api:8000;
}

server {
    listen 80;
    server_name _;

    # Allow PDF uploads (10 MB) + listing photos (5 MB × 20)
    client_max_body_size 25M;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Agent SSE — buffering must be OFF for token streaming ─────────────
    location /agent/ {
        proxy_pass         http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection '';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
    }

    # ── All other API routes ───────────────────────────────────────────────
    location ~ ^/(auth|users|listings|fraud|contracts|areas|estimator|notifications|roommate|health|docs|openapi.json|redoc) {
        proxy_pass         http://api_backend;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # ── Cache Vite-hashed bundles for 1 year ──────────────────────────────
    location ~* \.(js|css|woff2?|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── React SPA fallback ────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
